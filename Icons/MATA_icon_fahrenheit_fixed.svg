  <!-- Label text with correct degree symbol -->
  <text
    x="71" y="164"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11.5"
    font-weight="700"
    letter-spacing="1.2"
    text-anchor="middle"
    fill="white">UP TO 212&#176;F</text>
